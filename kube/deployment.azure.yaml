# PARCS Kubernetes Deployment for Azure (AKS)
# 
# Architecture Overview:
# - Daemons are deployed as short-lived Kubernetes Jobs, created dynamically by KEDA
# - KEDA monitors Azure Service Bus queue "point-requested" and scales based on message count
# - Each message in the queue triggers creation of one daemon Job pod
# - AKS Cluster Autoscaler automatically provisions nodes when resource limits are reached
#
# Prerequisites:
# 1. KEDA must be installed in the cluster: kubectl apply -f https://github.com/kedacore/keda/releases/download/v2.12.0/keda-2.12.0.yaml
# 2. Azure Service Bus namespace and queue "point-requested" must exist
# 3. Create Service Bus secret: kubectl create secret generic parcs-servicebus-secret --from-literal=connectionString='<connection-string>'
# 4. Enable AKS Cluster Autoscaler on the node pool with appropriate min/max node limits
#
# AKS Cluster Autoscaler Configuration (via Azure Portal or CLI):
# - Enable cluster autoscaler on node pool
# - Set minimum nodes (e.g., 1-2 for cost optimization)
# - Set maximum nodes based on expected workload (e.g., 10-20)
# - Configure node VM size (DS2_v2 minimum, Standard_D4_v5 or larger recommended)
#
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: parcs-storage-volume-claim
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: azurefile-csi
  resources:
    requests:
      storage: 256Mi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: parcs-database-volume-claim
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: managed-csi
  resources:
    requests:
      storage: 256Mi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: elasticsearch-data
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: azurefile-csi
  resources:
    requests:
      storage: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  labels:
    app: elasticsearch
spec:
  ports:
  - name: http
    port: 9200
    targetPort: 9200
  selector:
    app: elasticsearch
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
      - name: elasticsearch
        image: elasticsearch:8.15.0
        imagePullPolicy: Always
        ports:
        - containerPort: 9200
        env:
        - name: discovery.type
          value: single-node
        - name: xpack.security.enabled
          value: "false"
        resources:
          limits:
            cpu: 1000m
            memory: 3Gi
          requests:
            cpu: 500m
            memory: 2Gi
        volumeMounts:
        - name: elasticsearch-data
          mountPath: /usr/share/elasticsearch/data
      volumes:
      - name: elasticsearch-data
        persistentVolumeClaim:
          claimName: elasticsearch-data
---
apiVersion: v1
kind: Service
metadata:
  name: kibana
  labels:
    app: kibana
spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 5601
    targetPort: 5601
  selector:
    app: kibana
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      containers:
      - name: kibana
        image: kibana:8.15.0
        imagePullPolicy: Always
        ports:
        - containerPort: 5601
        env:
        - name: ELASTICSEARCH_URL
          value: http://elasticsearch:9200
        resources:
          limits:
            cpu: 500m
            memory: 1Gi
          requests:
            cpu: 200m
            memory: 512Mi
---
# ScaledJob creates one Job pod per Service Bus message (one pod = one point).
# ScaledObject targets Deployments; ScaledJob is the correct resource for Job-per-message scaling.
apiVersion: keda.sh/v1alpha1
kind: ScaledJob
metadata:
  name: parcs-daemon-scaler
spec:
  jobTargetRef:
    parallelism: 1
    completions: 1
    backoffLimit: 2
    ttlSecondsAfterFinished: 300
    activeDeadlineSeconds: 3600
    template:
      metadata:
        labels:
          app: parcs-daemon
      spec:
        restartPolicy: Never
        dnsPolicy: ClusterFirst
        containers:
        - name: parcs-daemon
          image: oleksiibohusevych/parcsdaemon
          imagePullPolicy: Always
          ports:
          - containerPort: 1111
          resources:
            limits:
              cpu: 1000m
              memory: 2Gi
            requests:
              cpu: 250m
              memory: 512Mi
          volumeMounts:
          - name: parcs-storage-volume
            mountPath: /var/lib/storage
          env:
          - name: Hosting__Environment
            value: Kubernetes
          - name: Kubernetes__NamespaceName
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: HostApi__Uri
            value: parcs-hostapi-internal
          - name: Elasticsearch__BaseUrl
            value: 'http://elasticsearch:9200'
          - name: ServiceBus__ConnectionString
            valueFrom:
              secretKeyRef:
                name: parcs-servicebus-secret
                key: connectionString
          - name: ServiceBus__QueueName
            value: "point-requested"
        volumes:
        - name: parcs-storage-volume
          persistentVolumeClaim:
            claimName: parcs-storage-volume-claim
  minReplicaCount: 0
  maxReplicaCount: 1000
  triggers:
  - type: azure-servicebus
    metadata:
      queueName: point-requested
      messageCount: "1"
    authenticationRef:
      name: parcs-servicebus-auth
---
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: parcs-servicebus-auth
spec:
  secretTargetRef:
  - parameter: connection
    name: parcs-servicebus-secret
    key: connectionString
---
---
apiVersion: v1
kind: Service
metadata:
  name: parcs-hostapi
  labels:
    app: parcs-hostapi
spec:
  type: LoadBalancer
  ports:
  - name: https
    port: 443
    targetPort: 8080
  selector:
    app: parcs-hostapi
---
apiVersion: v1
kind: Service
metadata:
  name: parcs-hostapi-internal
  labels:
    app: parcs-hostapi
spec:
  ports:
  - name: https
    port: 443
    targetPort: 443
  - name: http
    port: 80
    targetPort: 8080
  - name: tcp-callback
    port: 2222
    targetPort: 2222   # Host TCP server for daemon callbacks
  selector:
    app: parcs-hostapi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: parcs-hostapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: parcs-hostapi
  template:
    metadata:
      labels:
        app: parcs-hostapi
    spec:
      dnsPolicy: ClusterFirst
      initContainers:
      - name: wait-for-elasticsearch
        image: busybox:1.36
        command: ['sh', '-c', 'until wget -qO- "http://elasticsearch:9200/_cluster/health?wait_for_status=yellow&timeout=30s" 2>/dev/null | grep -q "\"status\":\"yellow\"\|\"status\":\"green\""; do echo "Waiting for Elasticsearch yellow/green..."; sleep 10; done; echo "Elasticsearch ready"']
      - name: wait-for-database
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z parcs-database 5432; do echo "Waiting for PostgreSQL..."; sleep 5; done']
      containers:
      - name: parcs-hostapi
        image: oleksiibohusevych/parcshost
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 2222
          name: tcp-callback   # Host TCP server — daemons connect back here with their correlationId
        resources:
          limits:
            cpu: 1000m
            memory: 1Gi
          requests:
            cpu: 200m
            memory: 512Mi
        env:
        - name: Hosting__Environment
          value: Kubernetes
        - name: Kubernetes__NamespaceName
          value: Default
        - name: Kubernetes__DaemonsHeadlessServiceName
          value: parcs-daemon-headless
        - name: Database__HostName
          value: parcs-database
        - name: Database__DatabaseName
          value: parcs
        - name: Database__Username
          value: parcs_admin
        - name: Database__Password
          value: p5sAuuhrSxs9GHxD
        - name: Database__Port
          value: '5432'
        - name: Elasticsearch__BaseUrl
          value: 'http://elasticsearch:9200'
        - name: ServiceBus__ConnectionString
          valueFrom:
            secretKeyRef:
              name: parcs-servicebus-secret
              key: connectionString
        - name: ServiceBus__QueueName
          value: "point-requested"
        - name: HostTcp__Port
          value: "2222"
        volumeMounts:
        - name: parcs-storage-volume
          mountPath: /var/lib/storage
      volumes:
      - name: parcs-storage-volume
        persistentVolumeClaim:
          claimName: parcs-storage-volume-claim
---
apiVersion: v1
kind: Service
metadata:
  name: parcs-portal
  labels:
    app: parcs-portal
spec:
  type: LoadBalancer
  ports:
  - name: https
    port: 443
    targetPort: 443
  - name: http
    port: 80
    targetPort: 8080
  selector:
    app: parcs-portal
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: parcs-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: parcs-portal
  template:
    metadata:
      labels:
        app: parcs-portal
    spec:
      initContainers:
      - name: wait-for-elasticsearch
        image: busybox:1.36
        command: ['sh', '-c', 'until wget -qO- "http://elasticsearch:9200/_cluster/health?wait_for_status=yellow&timeout=30s" 2>/dev/null | grep -q "\"status\":\"yellow\"\|\"status\":\"green\""; do echo "Waiting for Elasticsearch yellow/green..."; sleep 10; done; echo "Elasticsearch ready"']
      - name: wait-for-hostapi
        image: busybox:1.36
        command: ['sh', '-c', 'until wget -qO- http://parcs-hostapi-internal/health; do echo "Waiting for Host API..."; sleep 5; done']
      containers:
      - name: parcs-portal
        image: oleksiibohusevych/parcsportal
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        env:
        - name: Host__Uri
          value: parcs-hostapi-internal
        - name: Portal__Uri
          value: parcs-portal
        - name: Portal__SignalrUri
          value: parcs-portal
        - name: Elasticsearch__BaseUrl
          value: 'http://elasticsearch:9200'
---
apiVersion: v1
kind: Service
metadata:
  name: parcs-database
  labels:
    app: parcs-database
spec:
  selector:
    app: parcs-database
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: parcs-database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: parcs-database
  template:
    metadata:
      labels:
        app: parcs-database
    spec:
      containers:
      - name: parcs-database
        image: postgres:latest
        imagePullPolicy: Always
        env:
        - name: POSTGRES_USER
          value: parcs_admin
        - name: POSTGRES_PASSWORD
          value: p5sAuuhrSxs9GHxD
        - name: POSTGRES_DB
          value: parcs
        - name: PGDATA
          value: /var/lib/postgresql/data/postgres
        ports:
        - containerPort: 5432
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
        volumeMounts:
        - name: parcs-database-volume
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: parcs-database-volume
        persistentVolumeClaim:
          claimName: parcs-database-volume-claim
